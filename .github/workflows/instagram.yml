name: Instagram Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  instagram:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Instaloader
        run: pip install instaloader

      - name: Download posts and stories
        run: |
          mkdir -p downloads
          instaloader nakamu_sl \
            --stories \
            --sessionfile session-atonofestival \
            --latest-stamps stamps.txt \
            --dirname-pattern downloads/{target}

      - name: Detect updates
        id: changes
        run: |
          if [ "$(ls -A downloads 2>/dev/null)" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Discord notification
        if: steps.changes.outputs.updated == 'true'
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content":"<@&1338644043243978792> 📸 nakamu_sl updated\nhttps://instagram.com/nakamu_sl"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
