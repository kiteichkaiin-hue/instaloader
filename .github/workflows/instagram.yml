name: Instagram Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Instaloader
        run: pip install instaloader

      - name: Login and fetch
        run: |
          instaloader \
          --login=${{ secrets.IG_LOGIN }} \
          --password=${{ secrets.IG_PASSWORD }} \
          nakamu_sl

      - name: Send Discord message
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content":"Instagram check ran successfully"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
