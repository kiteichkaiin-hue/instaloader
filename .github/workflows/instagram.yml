name: Instagram Monitor & Notify

on:
  schedule:
    - cron: '*/30 * * * *'  # 30分ごと
  workflow_dispatch:

jobs:
  fetch_instagram:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Python & Instaloader セットアップ
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Instaloader
        run: |
          python -m pip install --upgrade pip
          python -m pip install instaloader

      # 3️⃣ session ファイルを復号
      - name: Restore Instaloader session
        run: |
          echo "${{ secrets.INSTALOADER_SESSION }}" | base64 -d > session-atonofestival

      # 4️⃣ ダウンロード先作成
      - name: Create downloads folder
        run: mkdir -p downloads/nakamu_sl

      # 5️⃣ 投稿 & ストーリーを取得
      - name: Download posts and stories
        run: |
          python3 -m instaloader nakamu_sl \
            --stories \
            --sessionfile session-atonofestival \
            --latest-stamps stamps.txt \
            --dirname-pattern downloads/{target} || echo "No new content"

      # 6️⃣ Discord に画像付き通知（安全版）
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ROLE_ID: 1338644043243978792
        run: |
          FILES=$(find downloads/nakamu_sl -type f \( -name '*.jpg' -o -name '*.mp4' \))
          if [ -n "$FILES" ]; then
            while IFS= read -r FILE; do
              curl -F "content=<@&${ROLE_ID}> nakamu_sl has new content!" \
                   -F "file=@${FILE}" \
                   $DISCORD_WEBHOOK
            done <<< "$FILES"
          else
            echo "No new posts or stories"
