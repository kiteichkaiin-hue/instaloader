name: Instagram Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  instagram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Instaloader
        run: |
          pip install instaloader

      - name: Login to Instagram
        run: |
          instaloader --login ${{ secrets.IG_LOGIN }} --password ${{ secrets.IG_PASSWORD }}

      - name: Download latest posts and stories
        run: |
          instaloader nakamu_sl --stories --no-video-thumbnails --no-captions --no-metadata-json

      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content":"📸 Instagram activity detected: https://instagram.com/nakamu_sl"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
