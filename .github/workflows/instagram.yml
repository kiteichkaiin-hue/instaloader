name: Instagram Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  instagram:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: pip install instaloader

      - name: Login
        run: |
          instaloader --login=${{ secrets.IG_LOGIN }} --password=${{ secrets.IG_PASSWORD }}

      - name: Download latest
        run: |
          instaloader nakamu_sl --stories --latest-stamps stamps.txt

      - name: Notify Discord
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content":"📸 nakamu_sl updated (post or story) https://instagram.com/nakamu_sl"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
