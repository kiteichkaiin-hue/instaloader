name: Instagram Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  instagram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Instaloader
        run: |
          pip install instaloader

      - name: Login to Instagram
        run: |
          instaloader --login ${{ secrets.IG_LOGIN }} --password ${{ secrets.IG_PASSWORD }}

      - name: Download latest content
        run: |
          mkdir downloads
          instaloader nakamu_sl \
          --stories \
          --latest-stamps stamps.txt \
          --dirname-pattern downloads/{target}

      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content":"📸 nakamu_sl updated (post or story)\nhttps://instagram.com/nakamu_sl"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
